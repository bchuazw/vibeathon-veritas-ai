services:
  - type: web
    name: veritas-ai-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./veritas.db
      - key: DEBUG
        value: false

  - type: web
    name: veritas-ai-frontend
    runtime: node
    region: singapore
    plan: free
    rootDir: web
    buildCommand: npm install && npm run build && npm prune --production
    startCommand: npx next start -p $PORT
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://veritas-ai-backend.onrender.com
