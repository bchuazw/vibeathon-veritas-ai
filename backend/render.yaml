services:
  - type: web
    name: veritas-ai-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # Set in Render dashboard
      - key: NEWSAPI_KEY
        sync: false  # Set in Render dashboard
      - key: DATABASE_URL
        value: sqlite:///./data/veritas.db
      - key: DEBUG
        value: false
