services:
  - type: web
    name: veritas-ai-backend
    runtime: docker
    region: singapore
    plan: free
    rootDir: backend
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./veritas.db
      - key: DEBUG
        value: false

  - type: static
    name: veritas-ai-frontend
    region: singapore
    rootDir: web
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://veritas-ai-backend.onrender.com
