services:
  - type: web
    name: veritas-ai-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./data/veritas.db
      - key: DEBUG
        value: false
    disk:
      name: data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1

  - type: web
    name: veritas-ai-frontend
    runtime: node
    region: singapore
    plan: free
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://veritas-ai-backend.onrender.com
