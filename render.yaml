services:
  - type: web
    name: veritas-ai-backend
    runtime: docker
    region: singapore
    plan: free
    rootDir: backend
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./veritas.db
      - key: DEBUG
        value: false

  - type: web
    name: veritas-ai-frontend
    runtime: node
    region: singapore
    plan: free
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://veritas-ai-backend-p7t5.onrender.com
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
